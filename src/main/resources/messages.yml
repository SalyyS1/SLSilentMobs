  list-empty: "&7No active silent mobs"
  global-enabled: "&aGlobal Silent mode &2ENABLED"
  global-disabled: "&cGlobal Silent mode &4DISABLED"
  global-status: "&bGlobal Silent: {status}&b | Active mobs: &e{count}"
